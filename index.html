<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="网络测试">
    <title>网络测试工具</title>
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23007AFF' width='100' height='100' rx='20'/><text x='50' y='60' font-size='40' text-anchor='middle' fill='white'>网</text></svg>">
    <style>
        :root {
            --primary: #007AFF;
            --success: #34C759;
            --warning: #FF9500;
            --danger: #FF3B30;
            --bg: #000000;
            --card-bg: #1C1C1E;
            --text: #FFFFFF;
            --text-secondary: #8E8E93;
            --border: #38383A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }

        .header {
            text-align: center;
            padding: 15px 0 25px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .speed-row {
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
        }

        .speed-item {
            text-align: center;
        }

        .speed-value {
            font-size: 32px;
            font-weight: 700;
        }

        .speed-value.download { color: var(--success); }
        .speed-value.upload { color: var(--primary); }

        .speed-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child { border-bottom: none; }

        .stat-label {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 500;
        }

        .status-good { color: var(--success); }
        .status-warning { color: var(--warning); }
        .status-bad { color: var(--danger); }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:active { background: #0056CC; }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .progress-bar {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .device-list {
            font-size: 13px;
        }

        .device-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .device-ip { color: var(--text); }
        .device-latency { font-weight: 500; }

        .address-info {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }

        .address-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
        }

        .address-label { color: var(--text-secondary); }
        .address-value { color: var(--text); font-weight: 500; }
    </style>
</head>
<body>
    <div class="header">
        <h1>网络测试工具</h1>
    </div>

    <!-- 速度测试 -->
    <div class="card">
        <div class="card-title">速度测试</div>
        <div class="speed-row">
            <div class="speed-item">
                <div class="speed-value download" id="downloadSpeed">--</div>
                <div class="speed-label">下载速度 Mbps</div>
            </div>
            <div class="speed-item">
                <div class="speed-value upload" id="uploadSpeed">--</div>
                <div class="speed-label">上传速度 Mbps</div>
            </div>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="speedProgress"></div>
        </div>
        <button class="btn btn-primary" onclick="runSpeedTest()">开始测速</button>
    </div>

    <!-- Ping和抖动 -->
    <div class="card">
        <div class="card-title">延迟与抖动</div>
        <div class="stat-row">
            <span class="stat-label">平均延迟</span>
            <span class="stat-value" id="avgPing">-- ms</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">抖动 (Jitter)</span>
            <span class="stat-value" id="jitter">-- ms</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">最小延迟</span>
            <span class="stat-value" id="minPing">-- ms</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">最大延迟</span>
            <span class="stat-value" id="maxPing">-- ms</span>
        </div>
        <button class="btn btn-secondary" onclick="runPingTest()">测试延迟</button>
    </div>

    <!-- 局域网设备 -->
    <div class="card">
        <div class="card-title">局域网设备 Ping</div>
        <div class="device-list" id="deviceList">
            <div style="color: var(--text-secondary); padding: 10px 0;">点击下方按钮扫描局域网设备</div>
        </div>
        <button class="btn btn-secondary" onclick="scanLAN()">扫描局域网</button>
    </div>

    <!-- 地址信息 -->
    <div class="card">
        <div class="card-title">地址信息</div>
        <div class="address-info">
            <div class="address-item">
                <span class="address-label">本机IP</span>
                <span class="address-value" id="localIP">检测中...</span>
            </div>
            <div class="address-item">
                <span class="address-label">外网IP</span>
                <span class="address-value" id="publicIP">检测中...</span>
            </div>
            <div class="address-item">
                <span class="address-label">运营商</span>
                <span class="address-value" id="isp">检测中...</span>
            </div>
            <div class="address-item">
                <span class="address-label">位置</span>
                <span class="address-value" id="location">检测中...</span>
            </div>
        </div>
        <button class="btn btn-secondary" onclick="getAddressInfo()">获取地址</button>
    </div>

    <!-- 一键测试 -->
    <button class="btn btn-primary" onclick="runAllTests()" style="background: var(--success);">
        一键全面测试
    </button>

    <script>
        // ===== 速度测试 =====
        async function runSpeedTest() {
            const downloadEl = document.getElementById('downloadSpeed');
            const uploadEl = document.getElementById('uploadSpeed');
            const progressEl = document.getElementById('speedProgress');

            downloadEl.innerHTML = '<span class="spinner"></span>';
            uploadEl.innerHTML = '<span class="spinner"></span>';
            progressEl.style.width = '0%';

            // 下载测试
            let downloadSpeed = 0;
            try {
                progressEl.style.width = '25%';
                const sizes = [100000, 500000, 1000000];
                let totalBytes = 0, totalTime = 0;

                for (let i = 0; i < sizes.length; i++) {
                    const start = performance.now();
                    const response = await fetch(`https://speed.cloudflare.com/__down?bytes=${sizes[i]}`, {
                        mode: 'cors', cache: 'no-store'
                    });
                    const blob = await response.blob();
                    const end = performance.now();
                    totalBytes += blob.size;
                    totalTime += (end - start);
                    progressEl.style.width = `${25 + (i + 1) * 15}%`;
                }

                downloadSpeed = (totalBytes * 8 / (totalTime / 1000) / 1000000).toFixed(2);
                downloadEl.textContent = downloadSpeed;
            } catch (e) {
                downloadEl.textContent = '--';
            }

            // 上传测试
            try {
                progressEl.style.width = '75%';
                const testData = new Uint8Array(500000);
                const start = performance.now();
                await fetch('https://httpbin.org/post', {
                    method: 'POST',
                    body: testData,
                    headers: { 'Content-Type': 'application/octet-stream' }
                });
                const end = performance.now();
                const uploadSpeed = (500000 * 8 / (end - start) / 1000).toFixed(2);
                uploadEl.textContent = uploadSpeed;
            } catch (e) {
                uploadEl.textContent = '--';
            }

            progressEl.style.width = '100%';
        }

        // ===== Ping测试 =====
        async function runPingTest() {
            document.getElementById('avgPing').innerHTML = '<span class="spinner"></span>';
            document.getElementById('jitter').innerHTML = '<span class="spinner"></span>';
            document.getElementById('minPing').innerHTML = '<span class="spinner"></span>';
            document.getElementById('maxPing').innerHTML = '<span class="spinner"></span>';

            const latencies = [];
            const iterations = 10;
            // 使用百度和阿里测试（不使用Google）
            const testUrls = [
                'https://www.baidu.com/favicon.ico',
                'https://www.aliyun.com/favicon.ico'
            ];

            for (let i = 0; i < iterations; i++) {
                for (const url of testUrls) {
                    try {
                        const start = performance.now();
                        await fetch(url, { mode: 'no-cors', cache: 'no-store' });
                        latencies.push(performance.now() - start);
                    } catch (e) {
                        // 忽略错误
                    }
                }
            }

            const validLatencies = latencies.filter(l => l !== null);
            if (validLatencies.length > 0) {
                const avg = validLatencies.reduce((a, b) => a + b, 0) / validLatencies.length;
                const min = Math.min(...validLatencies);
                const max = Math.max(...validLatencies);
                // 抖动 = 延迟变化的标准差估算
                const jitter = max - min;

                document.getElementById('avgPing').textContent = `${avg.toFixed(1)} ms`;
                document.getElementById('minPing').textContent = `${min.toFixed(1)} ms`;
                document.getElementById('maxPing').textContent = `${max.toFixed(1)} ms`;
                document.getElementById('jitter').textContent = `${jitter.toFixed(1)} ms`;

                // 根据延迟设置颜色
                const avgEl = document.getElementById('avgPing');
                avgEl.className = avg < 100 ? 'stat-value status-good' : avg < 300 ? 'stat-value status-warning' : 'stat-value status-bad';
            } else {
                document.getElementById('avgPing').textContent = '--';
                document.getElementById('jitter').textContent = '--';
                document.getElementById('minPing').textContent = '--';
                document.getElementById('maxPing').textContent = '--';
            }
        }

        // ===== 局域网设备Ping（随机检测2-3个设备） =====
        async function scanLAN() {
            const listEl = document.getElementById('deviceList');
            listEl.innerHTML = '<div style="color: var(--text-secondary); padding: 10px 0;"><span class="spinner"></span> 正在检测局域网设备...</div>';

            const foundDevices = [];

            // 测试常见局域网设备IP（网关、路由器等）
            const testDevices = [
                { ip: '192.168.1.1', name: '路由器1' },
                { ip: '192.168.0.1', name: '路由器2' },
                { ip: '192.168.99.1', name: '网关' },
                { ip: '10.0.0.1', name: '内网设备' },
            ];

            // 随机选2-3个测试
            const shuffled = testDevices.sort(() => Math.random() - 0.5).slice(0, 3);

            for (const device of shuffled) {
                try {
                    const start = performance.now();
                    await fetch(`http://${device.ip}/`, {
                        mode: 'no-cors',
                        cache: 'no-store'
                    });
                    const latency = performance.now() - start;
                    foundDevices.push({ ip: device.ip, latency: latency });
                } catch (e) {
                    // 设备不响应，记录但延迟设为N/A
                    foundDevices.push({ ip: device.ip, latency: null });
                }
            }

            // 显示结果
            if (foundDevices.length > 0) {
                listEl.innerHTML = foundDevices.map(d => `
                    <div class="device-item">
                        <span class="device-ip">${d.ip}</span>
                        <span class="device-latency ${d.latency === null ? 'status-bad' : d.latency < 100 ? 'status-good' : d.latency < 500 ? 'status-warning' : 'status-bad'}">${d.latency !== null ? d.latency.toFixed(0) + ' ms' : 'N/A'}</span>
                    </div>
                `).join('');
            } else {
                listEl.innerHTML = '<div style="color: var(--text-secondary); padding: 10px 0;">无法检测（iOS限制）</div>';
            }
        }

        // ===== 地址信息 =====
        async function getAddressInfo() {
            document.getElementById('publicIP').innerHTML = '<span class="spinner"></span>';
            document.getElementById('isp').innerHTML = '<span class="spinner"></span>';

            // 获取公网IP和运营商信息
            try {
                const response = await fetch('https://ipinfo.io/json');
                const data = await response.json();

                document.getElementById('publicIP').textContent = data.ip || '--';
                document.getElementById('isp').textContent = data.org ? data.org.split(' ').slice(1).join(' ') : '--';
                document.getElementById('location').textContent = `${data.city || ''}, ${data.country || ''}`;
            } catch (e) {
                document.getElementById('publicIP').textContent = '--';
                document.getElementById('isp').textContent = '--';
                document.getElementById('location').textContent = '--';
            }

            // 本机IP（iOS无法直接获取，显示公网IP作为参考）
            document.getElementById('localIP').textContent = 'iOS限制';
        }

        // ===== 一键全面测试 =====
        async function runAllTests() {
            document.getElementById('speedProgress').style.width = '0%';

            await getAddressInfo();
            await runSpeedTest();
            await runPingTest();
            await scanLAN();
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            getAddressInfo();
        });
    </script>
</body>
</html>
